<style>
  /* ============ Reset / Base ============ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    min-height: 100dvh;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }

  :root {
    --bg-deep: #0a0e27;
    --bg-mid: #101d3f;
    --bg-low: #0d1b2a;

    --text-main: #c8d6e5;
    --text-bright: #f0f4f8;
    --text-sub: #6b7fa3;

    --accent-deep: #2a4a7f;
    --accent-shadow: #1a3a6a;

    --moon: #d4e0ed;
  }

body {
    background-color: var(--bg-low);
    color: var(--text-main);
    font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    font-weight: 400;
    line-height: 1.7;
    letter-spacing: 0.05em;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(ellipse at 50% 15%, rgba(212, 224, 237, 0.04) 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 55%, var(--bg-low) 100%);
  }

#app {
    position: relative;
    width: 100%;
    height: 100%;
    height: 100dvh;
    z-index: 2;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ============ 背景：星 ============ */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: var(--moon);
    box-shadow: 0 0 4px rgba(212, 224, 237, 0.6);
    opacity: 0.3;
    animation: twinkle var(--dur, 5s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }
  .star.lg { width: 3px; height: 3px; box-shadow: 0 0 6px rgba(212, 224, 237, 0.7); }
  .star.sm { width: 1px; height: 1px; }

  @keyframes twinkle {
    0%, 100% { opacity: 0.15; transform: scale(0.9); }
    50% { opacity: 0.85; transform: scale(1.1); }
  }

  /* ============ 背景：波 ============ */
  .waves {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 38vh;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .wave {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 200%;
    height: 100%;
    will-change: transform;
backface-visibility: hidden;
  }
  .wave svg {
    display: block;
    width: 100%;
    height: 100%;
  }
  .wave.layer1 {
    opacity: 0.45;
    animation: wave-flow 56s linear infinite;
  }
  .wave.layer2 {
    opacity: 0.35;
    animation: wave-flow 40s linear infinite reverse;
    bottom: -5%;
  }
  .wave.layer3 {
    opacity: 0.6;
    animation: wave-flow 32s linear infinite;
    bottom: -10%;
  }
  @keyframes wave-flow {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ============ 共通画面構造 ============ */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 5vh 6vw;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.7s ease;
  }
  .screen.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* ============ 開始画面 ============ */
  #screen-start .title {
    font-family: 'Shippori Mincho', serif;
    font-weight: 500;
    font-size: clamp(3.5rem, 14vw, 5.5rem);
    color: var(--text-bright);
    letter-spacing: 0.3em;
    text-indent: 0.3em;
    margin-bottom: 0.8rem;
    text-shadow: 0 0 30px rgba(212, 224, 237, 0.2);
  }
  #screen-start .subtitle {
    font-size: 0.85rem;
    color: var(--text-sub);
    letter-spacing: 0.4em;
    text-indent: 0.4em;
    margin-bottom: 4rem;
    font-weight: 400;
  }

  .settings {
    width: 100%;
    max-width: 320px;
    margin-bottom: 4rem;

    align-items: center;
    justify-content: space-between;
    padding: 1.1rem 0;
    border-bottom: 1px solid rgba(107, 127, 163, 0.2);

  .setting-label {
    font-size: 0.95rem;
    color: var(--text-main);
    letter-spacing: 0.15em;
  }
  .setting-control {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .setting-btn {
    width: 36px;
    height: 36px;
    border: 1px solid rgba(200, 214, 229, 0.3);
    background: transparent;
    color: var(--text-main);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    border-radius: 50%;
    cursor: pointer;

    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;

    background: rgba(212, 224, 237, 0.08);
    border-color: rgba(200, 214, 229, 0.6);

    opacity: 0.25;
    cursor: not-allowed;

    font-size: 1.6rem;
    color: var(--text-bright);
    min-width: 2.5rem;
    text-align: center;
    font-weight: 300;

    color: var(--text-sub);
    margin-left: 0.2rem;
    letter-spacing: 0.1em;

    text-indent: 0.5em;
    font-weight: 400;

    position: relative;
    overflow: hidden;
    transition: all 0.5s ease;

    display: flex;
    align-items: center;
    justify-content: center;

  /* 呼吸インジケーター（月） */

.breath-orb {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0.7);
    background: rgba(42, 74, 127, 0.55);
    box-shadow:
      0 0 50px rgba(42, 74, 127, 0.4),
      0 0 100px rgba(42, 74, 127, 0.2);
    opacity: 0.85;
    transition: transform 5s ease-in-out, opacity 5s ease-in-out;
    will-change: transform, opacity;
  }

  .breath-orb::before,
  .breath-orb::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(212, 224, 237, 0.25);
    animation: ripple 4s ease-out infinite;
  }
  .breath-orb::after {
    animation-delay: 2s;
  }
  .breath-orb.holding {
    animation: hold-pulse 2.5s ease-in-out infinite;
  }
  @keyframes hold-pulse {
    0%, 100% { filter: brightness(1); }
    50%      { filter: brightness(1.15); }
  }

  @keyframes ripple {
    0%   { transform: scale(1);   opacity: 0.6; }
    100% { transform: scale(1.5); opacity: 0;   }
  }

  /* メッセージ */
  .message {

    z-index: 2;

</style>

/* =====================================================
   凪 — 肩の緊張解除ガイド

/* ---------- 効果音 ---------- */
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) audioCtx = new Ctx();
    } catch (e) {
      audioCtx = null;
    }
  }
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function playChime(frequency) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  // 基音
  const osc1 = audioCtx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.setValueAtTime(frequency, now);

  // 5度上の倍音（薄く）
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(frequency * 1.5, now);

  const gain1 = audioCtx.createGain();
  gain1.gain.setValueAtTime(0.0001, now);
  gain1.gain.linearRampToValueAtTime(0.06, now + 0.03);
  gain1.gain.exponentialRampToValueAtTime(0.0001, now + 1.6);

  const gain2 = audioCtx.createGain();
  gain2.gain.setValueAtTime(0.0001, now);
  gain2.gain.linearRampToValueAtTime(0.02, now + 0.03);
  gain2.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);

  osc1.connect(gain1).connect(audioCtx.destination);
  osc2.connect(gain2).connect(audioCtx.destination);

  osc1.start(now);
  osc2.start(now);
  osc1.stop(now + 1.7);
  osc2.stop(now + 1.3);
}

    const star = document.createElement('div');
    star.className = 'star';
    if (Math.random() < 0.2) star.classList.add('lg');
    else if (Math.random() < 0.4) star.classList.add('sm');
    star.style.left = `${Math.random() * 100}%`;
    star.style.top = `${Math.random() * 65}%`;
    star.style.setProperty('--dur', `${3 + Math.random() * 5}s`);
    star.style.setProperty('--delay', `${Math.random() * 5}s`);
    container.appendChild(star);
  }
}
generateStars();

/* ---------- 設定UI ---------- */
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function bindStepper(minusId, plusId, get, set, min, max) {
  $(minusId).addEventListener('click', () => set(clamp(get() - 1, min, max)));
  $(plusId).addEventListener('click',  () => set(clamp(get() + 1, min, max)));
}

bindStepper('sets-minus', 'sets-plus',
  () => state.totalSets,
  (v) => { state.totalSets = v; setsValueEl.textContent = v; },
  1, 10);

bindStepper('rest-minus', 'rest-plus',
  () => state.restSec,
  (v) => { state.restSec = v; restValueEl.textContent = v; },
  0, 10);

/* ---------- 画面遷移 ---------- */
function showScreen(name) {
  Object.values(screens).forEach((s) => s.classList.remove('active'));
  screens[name].classList.add('active');
}

/* ---------- メッセージ表示 ---------- */
function setMessage(text) {
  messageEl.classList.remove('show');
  setTimeout(() => {
    messageEl.textContent = text;
    requestAnimationFrame(() => {
      messageEl.classList.add('show');
    });
  }, 350);
}

function clearMessage() {
  messageEl.classList.remove('show');
  messageEl.textContent = '';
}

/* ---------- カウントダウン ---------- */
function startCountdown(seconds) {
  if (state.rafTick) cancelAnimationFrame(state.rafTick);
  const start = performance.now();
  const total = seconds * 1000;
  const tick = (now) => {
    const elapsed = now - start;
    const remaining = Math.max(0, Math.ceil((total - elapsed) / 1000));
    countdownEl.textContent = remaining > 0 ? remaining : '';
    if (elapsed < total && state.running) {
      state.rafTick = requestAnimationFrame(tick);
    }
  };
  state.rafTick = requestAnimationFrame(tick);
}

function stopCountdown() {
  if (state.rafTick) {
    cancelAnimationFrame(state.rafTick);
    state.rafTick = null;
  }
  countdownEl.textContent = '';
}

/* ---------- 呼吸インジケーター ---------- */
function setBreathState(scale, opacity, durationSec, holding) {
  orb.style.transition = `transform ${durationSec}s ease-in-out, opacity ${durationSec}s ease-in-out`;
  // transform に scale を反映（中央配置の translate を維持）
  orb.style.transform = `translate(-50%, -50%) scale(${scale})`;
  orb.style.opacity = opacity;
  orb.classList.toggle('holding', !!holding);
  orb.classList.remove('fade-out');
}

function resetBreath() {
  orb.style.transition = 'transform 1.2s ease, opacity 1.2s ease';
  orb.style.transform = 'translate(-50%, -50%) scale(0.7)';
  orb.style.opacity = '0.55';
  orb.classList.remove('holding');
}

/* ---------- 進行制御 ---------- */
function clearTimers() {
  state.timers.forEach((t) => clearTimeout(t));
  state.timers = [];
  stopCountdown();
}

function schedule(fn, delay) {
  const t = setTimeout(() => {
    state.timers = state.timers.filter((x) => x !== t);
    fn();
  }, delay);
  state.timers.push(t);
}

function runSet(setIndex) {
  if (!state.running) return;
  state.currentSet = setIndex;
  currentSetEl.textContent = String(setIndex);

  let cumulative = 0;

// 各フェーズを順に実行
  PHASES.forEach((phase, i) => {
    schedule(() => {
      if (!state.running) return;
      playChime(phase.tone);
      setMessage(pick(messages[phase.key]));
      setBreathState(phase.scale, phase.opacity, phase.duration, phase.hold);
      if (phase.countdownStart !== null) {
        startCountdown(phase.countdownStart);
      }
    }, cumulative);
    cumulative += phase.duration * 1000;
  });

  // セット完了時：休息か終了か
  schedule(() => {
    if (!state.running) return;
    if (setIndex < state.totalSets) {
      runRest(setIndex + 1);
    } else {
      finish();
    }
  }, cumulative);
}

function runRest(nextSetIndex) {
  if (!state.running) return;

  if (state.restSec === 0) {
    runSet(nextSetIndex);
    return;
  }

  setMessage(pick(messages.rest));
  resetBreath();
  startCountdown(state.restSec);

  schedule(() => {
    runSet(nextSetIndex);
  }, state.restSec * 1000);
}

function start() {
  state.running = true;
  totalSetEl.textContent = String(state.totalSets);
  showScreen('exercise');
  clearMessage();

  // 開始メッセージで導入（2秒）
  setBreathState(0.7, 0.55, 4, false);
  setTimeout(() => setMessage(pick(messages.start)), 100);

  schedule(() => {
    if (!state.running) return;
    runSet(1);
  }, 4400);
}

function finish() {
  state.running = false;
  clearTimers();
  orb.classList.add('fade-out');
  endMessageEl.textContent = pick(messages.end);
  setTimeout(() => {
    showScreen('end');
  }, 1000);
}

function abort() {
  state.running = false;
  clearTimers();
  resetBreath();
  clearMessage();
  showScreen('start');
}

/* ---------- イベント ---------- */
$('start-btn').addEventListener('click', () => {
  ensureAudio();
  start();
});
$('stop-btn').addEventListener('click', abort);
$('restart-btn').addEventListener('click', () => {
  resetBreath();
  showScreen('start');
});

/* ---------- ページ離脱時の停止 ---------- */
document.addEventListener('visibilitychange', () => {
  if (document.hidden && state.running) {
    abort();
  }
});

/* ---------- Service Worker 登録 ---------- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {/* 黙殺 */});
  });
}
</script>
